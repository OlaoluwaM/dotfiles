# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Mouse & Gestures ─────────
gesture = 3, horizontal, workspace

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ───────── Window Management ─────────
binde = $mainMod&SHIFT_L, left, resizeactive,-50 0
binde = $mainMod&SHIFT_L, right, resizeactive,50 0
binde = $mainMod&SHIFT_L, up, resizeactive,0 -50
binde = $mainMod&SHIFT_L, down, resizeactive,0 50

bind = $mainMod&CTRL, left, movewindow, l
bind = $mainMod&CTRL, right, movewindow, r
bind = $mainMod&CTRL, up, movewindow, u
bind = $mainMod&CTRL, down, movewindow, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = ALT, F4, exec, hyprctl dispatch killactive
bind = $mainMod&SHIFT_L, F, togglefloating,

# ───────── System & Hardware ─────────
# bindl = ALT_L, SHIFT_L, exec, hyprctl switchxkblayout main prev
# bindl = SHIFT_L, ALT_L, exec, hyprctl switchxkblayout main next

bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = SUPER SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
bindl = , XF86PowerOff, exec, bash ~/.config/hypr/scripts/lock.sh
bindel = $mainMod, L, exec, bash ~/.config/hypr/scripts/lock.sh

# ───────── Media & Audio ─────────
bindl = $mainMod, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , xf86audiomute, exec, swayosd-client --output-volume mute-toggle
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise

# ───────── Applications & Launchers ─────────
bind = $mainMod, F, exec, firefox
bind = $mainMod, E, exec, nautilus
bind = $mainMod, T, exec, Telegram
bind = $mainMod, O, exec, obsidian
bind = $mainMod, RETURN, exec, $terminal

# ───────── Quickshell Controls ─────────
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = $mainMod, R, exec, bash ~/.config/hypr/scripts/reload.sh
bind = $mainMod, D, exec, ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bind = $mainMod, C, exec, ~/.config/hypr/scripts/qs_manager.sh toggle clipboard 
bind = $mainMod, Q, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, W, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, N, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod&SHIFT_L, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume

# ───────── Workspaces ─────────
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move
